<!DOCTYPE html>
<html>
<head>
    <title>Drone System</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f2f2f2;
        }

        .box {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 420px;
            border-radius: 10px;
        }

        input, select {
            padding: 8px;
            margin: 5px;
            width: 80%;
        }

        button {
            padding: 10px;
            margin: 5px;
        }
    </style>
</head>

<body>

    <h1>🚁 Drone System</h1>

    <div class="box">
        <h3>Login</h3>
        <input id="username" placeholder="Username"><br>
        <input id="password" placeholder="Password"><br>
        <button onclick="login()">Login</button>
        <p id="role"></p>
    </div>

    <div class="box" id="adminPanel" style="display:none;">
        <h3>Admin Panel</h3>

        <input id="opUsername" placeholder="Operator Username"><br>
        <input id="opPassword" placeholder="Password"><br>
        <button onclick="addOperator()">Add Operator</button>

        <hr>

        <input id="dName" placeholder="Drone Name"><br>
        <input id="dModel" placeholder="Model"><br>
        <input id="dSpeed" placeholder="Speed"><br>
        <button onclick="addDrone()">Add Drone</button>

        <hr>

        <h4>Edit selected drone</h4>
        <input id="editSpeed" placeholder="Speed"><br>
        <button onclick="updateDrone()">Update Drone</button>

        <hr>

        <select id="droneSelect"></select>
        <select id="operatorSelect"></select>
        <button onclick="assign()">Assign</button>
    </div>

    <div class="box" id="operatorPanel" style="display:none;">
        <h3>Operator Panel</h3>
        <select id="myDrone"></select><br>

        <button onclick="move()">Move</button>
        <button onclick="takeoff()">Takeoff</button>
        <button onclick="land()">Land</button>
        <button onclick="photo()">Photo</button>
        <input id="posX" placeholder="Enter X"><br>
        <input id="posY" placeholder="Enter Y"><br>
        <button onclick="moveToPosition()">Move To Position</button>
    </div>

    <script>
        let token = "", role = "";

        async function login() {
            let res = await fetch("/api/v1/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username: username.value, password: password.value })
            });

            let data = await res.json();
            token = data.token;

            let payload = JSON.parse(atob(token.split('.')[1]));
            role = payload.role || payload["http://schemas.microsoft.com/ws/2008/06/identity/claims/role"];

            document.getElementById("role").innerText = "Role:" + role;

            if (role === "Admin") { adminPanel.style.display = "block"; loadAdmin(); }
            if (role === "Operator") { operatorPanel.style.display = "block"; loadDrone(); }
        }

        async function addOperator() {
            await fetch("/api/v1/add-operator", {
                method: "POST",
                headers: { Authorization: "Bearer " + token, "Content-Type": "application/json" },
                body: JSON.stringify({ username: opUsername.value, password: opPassword.value })
            });
            alert("Operator added");
            loadAdmin();
        }

    async function addDrone() {
            await fetch("/api/v1/drones", {
                method: "POST",
                headers: { Authorization: "Bearer " + token, "Content-Type": "application/json" },
                body: JSON.stringify({
                    name: dName.value, model: dModel.value,
                    // battery is set server-side (default 100)
                    speed: parseInt(dSpeed.value),
                    x: 0, y: 0, status: "Idle"
                })
            });
            alert("Drone added");
            loadAdmin();
        }

        async function assign() {
            await fetch("/api/v1/assign", {
                method: "POST",
                headers: { Authorization: "Bearer " + token, "Content-Type": "application/json" },
                body: JSON.stringify({
                    droneId: parseInt(droneSelect.value),
                    operatorId: parseInt(operatorSelect.value)
                })
            });
            alert("Assigned");
        }

    async function updateDrone() {
        const id = parseInt(droneSelect.value);
        const speedVal = editSpeed.value ? parseInt(editSpeed.value) : null;

        await fetch(`/api/v1/drones/${id}/update`, {
            method: "POST",
            headers: { Authorization: "Bearer " + token, "Content-Type": "application/json" },
            body: JSON.stringify({ speed: speedVal })
        });

        alert("Drone updated");
        loadAdmin();
    }

        
        async function loadAdmin() {
            let drones = await fetch("/api/v1/drones", {
                headers: { Authorization: "Bearer " + token }
            }).then(r => r.json());

            let ops = await fetch("/api/v1/operators", {
                headers: { Authorization: "Bearer " + token }
            }).then(r => r.json());

            droneSelect.innerHTML = "";
            operatorSelect.innerHTML = "";

            console.log("DRONES DATA:", drones); // 🔥 DEBUG

            drones.forEach(d => {
                let name = d.name || d.Name || ("Drone " + d.id);  // ✅ FIX
                let info = `${name} (Speed:${d.speed ?? d.Speed})`;
                droneSelect.innerHTML += `<option value="${d.id}">${info}</option>`;
            });

            ops.forEach(o => {
                operatorSelect.innerHTML += `<option value="${o.id}">${o.username}</option>`;
            });
        }
        async function loadDrone() {
            let d = await fetch("/api/v1/drones", { headers: { Authorization: "Bearer " + token } }).then(r => r.json());
            myDrone.innerHTML = "";
        d.forEach(x => myDrone.innerHTML += `<option value="${x.id}">${x.name} (Battery:${x.battery}, Speed:${x.speed})</option>`);
        }

        async function move() {
            await fetch(`/api/v1/move/${myDrone.value}`, { method: "POST", headers: { Authorization: "Bearer " + token } });
        }
        async function takeoff() {
            await fetch(`/api/v1/takeoff/${myDrone.value}`, { method: "POST", headers: { Authorization: "Bearer " + token } });
        }
        async function land() {
            await fetch(`/api/v1/land/${myDrone.value}`, { method: "POST", headers: { Authorization: "Bearer " + token } });
        }
        async function photo() {
            await fetch(`/api/v1/photo/${myDrone.value}`, { method: "POST", headers: { Authorization: "Bearer " + token } });
            alert("Photo Taken");
        }
        async function moveToPosition() {
            let x = parseInt(posX.value);
            let y = parseInt(posY.value);

            await fetch("/api/v1/move-to-position", {
                method: "POST",
                headers: {
                    "Authorization": "Bearer " + token,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    droneId: parseInt(myDrone.value),
                    x: x,
                    y: y
                })
            });

            alert("Drone moved to (" + x + "," + y + ")");
        }
    </script>


</body>
</html>
